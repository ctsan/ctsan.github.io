<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 200"
     preserveAspectRatio="none"
     style="width:100%; height:200px; display:block;">
  <!-- Dark semi-transparent background -->
  <rect x="0" y="0" width="1200" height="200" fill="#000" opacity="0.6"/>

  <defs>
    <style type="text/css"><![CDATA[
      .symbol {
        font-family: 'STIXGeneral','Cambria Math',serif;
        font-size: 24px;
        fill: #fff;
        stroke: #000;
        stroke-width: 0.3px;
        paint-order: stroke fill;
        opacity: 0.9;
      }
    ]]></style>
  </defs>

  <!-- Slower, dense mathematical symbol animations -->
  <g text-anchor="middle">
    <text class="symbol" x="-50" y="30">π
      <animate attributeName="x" from="-50" to="1250" dur="12s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="60">Σ
      <animate attributeName="x" from="-50" to="1250" dur="16s" begin="0.8s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="90">∞
      <animate attributeName="x" from="-50" to="1250" dur="10s" begin="2.2s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="120">∫
      <animate attributeName="x" from="-50" to="1250" dur="14s" begin="1.4s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="150">α
      <animate attributeName="x" from="-50" to="1250" dur="9s" begin="3.6s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="180">β
      <animate attributeName="x" from="-50" to="1250" dur="13s" begin="4.6s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="45">λ
      <animate attributeName="x" from="-50" to="1250" dur="11s" begin="1.8s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="75">φ
      <animate attributeName="x" from="-50" to="1250" dur="14.4s" begin="2.8s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="105">Δ
      <animate attributeName="x" from="-50" to="1250" dur="13.6s" begin="4.0s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="135">∇
      <animate attributeName="x" from="-50" to="1250" dur="10.4s" begin="5.2s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="165">Ω
      <animate attributeName="x" from="-50" to="1250" dur="16.6s" begin="6.2s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="20">θ
      <animate attributeName="x" from="-50" to="1250" dur="9.4s" begin="0.4s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="100">µ
      <animate attributeName="x" from="-50" to="1250" dur="12.2s" begin="3.2s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="130">σ
      <animate attributeName="x" from="-50" to="1250" dur="11.8s" begin="4.2s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="160">η
      <animate attributeName="x" from="-50" to="1250" dur="15.4s" begin="5.6s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="195">ξ
      <animate attributeName="x" from="-50" to="1250" dur="12.8s" begin="6.8s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="25">γ
      <animate attributeName="x" from="-50" to="1250" dur="10.6s" begin="0.6s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="55">∂
      <animate attributeName="x" from="-50" to="1250" dur="13.8s" begin="1.6s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="85">ℕ
      <animate attributeName="x" from="-50" to="1250" dur="13.4s" begin="5.0s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="115">ℝ
      <animate attributeName="x" from="-50" to="1250" dur="10.8s" begin="2.4s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="145">ℤ
      <animate attributeName="x" from="-50" to="1250" dur="9.2s" begin="4.4s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="175">δ
      <animate attributeName="x" from="-50" to="1250" dur="14.2s" begin="3.8s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="195">∝
      <animate attributeName="x" from="-50" to="1250" dur="15s" begin="6.0s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="165">≥
      <animate attributeName="x" from="-50" to="1250" dur="11.6s" begin="3.0s" repeatCount="indefinite"/>
    </text>
    <text class="symbol" x="-50" y="135">≤
      <animate attributeName="x" from="-50" to="1250" dur="12.6s" begin="5.4s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
